[pytest]
addopts = -v --strict-markers --html=reports/report.html --self-contained-html --reruns 1 --reruns-delay 1
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    smoke: important fast validation tests
    regression: complete workflow validation tests
    ui: browser based tests
    api: API based tests
    auth: login and authentication tests
    visual: browser visibility learning tests
timeout = 60
log_cli = true
log_cli_level = INFO
